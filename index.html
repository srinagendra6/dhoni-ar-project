<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dhoni AR Video Player</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; color: white; z-index: 99;
            font-family: sans-serif; visibility: visible;
        }
        #scanning-overlay.hidden { visibility: hidden; }
    </style>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="msdVideo" src="./videoplayback.mp4" loop="true" crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="videoTarget">
            <a-video src="#msdVideo" width="1" height="0.552" position="0 0 0.1" play-on-scan></a-video>
        </a-entity>
        
    </a-scene>

    <div id="scanning-overlay">
        <p>Scanning Dhoni photo...</p>
    </div>

    <script>
        // Custom component to play video when image is found
        AFRAME.registerComponent('play-on-scan', {
            init: function () {
                var el = this.el;
                var video = document.querySelector('#msdVideo');
                var target = document.querySelector('#videoTarget');
                var overlay = document.querySelector('#scanning-overlay');

                target.addEventListener('targetFound', event => {
                    console.log("Found");
                    video.play();
                    overlay.classList.add('hidden'); // Hide scanning text
                });

                target.addEventListener('targetLost', event => {
                    console.log("Lost");
                    video.pause();
                });
            }
        });
    </script>

</body>
</html>
